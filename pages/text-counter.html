<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProText | Advanced Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }
        .stat-card {
            background: white;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }
        .stat-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        textarea::placeholder { color: #94a3b8; }
        .accent-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">ProText <span class="text-blue-600">Counter</span></h1>
                <p class="text-slate-500">Analyze your content with precision.</p>
            </div>
            <div class="flex gap-2">
                <button onclick="copyText()" class="px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-lg font-semibold hover:bg-slate-50 transition flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    Copy
                </button>
                <button onclick="clearAll()" class="px-4 py-2 bg-red-50 text-red-600 rounded-lg font-semibold hover:bg-red-100 transition">Clear</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Side: Input & Tools -->
            <div class="lg:col-span-8 space-y-6">
                <div class="relative bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="flex items-center justify-between px-4 py-2 bg-slate-50 border-b border-slate-200">
                        <span class="text-xs font-bold uppercase text-slate-400 tracking-wider">Input Editor</span>
                        <div class="flex gap-4 text-xs font-medium text-slate-500">
                            <span id="char-limit">0 / 5000 chars</span>
                        </div>
                    </div>
                    <textarea id="main-input" 
                        class="w-full h-80 p-6 text-lg text-slate-800 outline-none resize-none"
                        placeholder="Paste or type your content here..."></textarea>
                    <div id="progress-bar" class="h-1 bg-blue-500 transition-all duration-300" style="width: 0%"></div>
                </div>

                <!-- Text Tools -->
                <div class="flex flex-wrap gap-2">
                    <button onclick="transform('upper')" class="text-xs font-bold px-3 py-2 bg-slate-800 text-white rounded-md hover:bg-slate-700">UPPERCASE</button>
                    <button onclick="transform('lower')" class="text-xs font-bold px-3 py-2 bg-slate-800 text-white rounded-md hover:bg-slate-700">lowercase</button>
                    <button onclick="transform('title')" class="text-xs font-bold px-3 py-2 bg-slate-800 text-white rounded-md hover:bg-slate-700">Title Case</button>
                    <button onclick="cleanSpaces()" class="text-xs font-bold px-3 py-2 bg-blue-100 text-blue-700 rounded-md hover:bg-blue-200">Remove Extra Spaces</button>
                </div>
            </div>

            <!-- Right Side: Statistics -->
            <div class="lg:col-span-4 space-y-6">
                <!-- Primary Stats Grid -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="stat-card p-4 rounded-xl">
                        <p class="text-slate-500 text-sm mb-1">Words</p>
                        <h3 id="word-count" class="text-2xl font-bold text-slate-900">0</h3>
                    </div>
                    <div class="stat-card p-4 rounded-xl">
                        <p class="text-slate-500 text-sm mb-1">Characters</p>
                        <h3 id="char-count" class="text-2xl font-bold text-slate-900">0</h3>
                    </div>
                    <div class="stat-card p-4 rounded-xl">
                        <p class="text-slate-500 text-sm mb-1">Sentences</p>
                        <h3 id="sent-count" class="text-2xl font-bold text-slate-900">0</h3>
                    </div>
                    <div class="stat-card p-4 rounded-xl">
                        <p class="text-slate-500 text-sm mb-1">Paragraphs</p>
                        <h3 id="para-count" class="text-2xl font-bold text-slate-900">0</h3>
                    </div>
                </div>

                <!-- Analysis Details -->
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm space-y-4">
                    <h4 class="font-bold text-slate-900 border-b pb-2">Detailed Analysis</h4>
                    
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-500">Reading Time</span>
                        <span id="read-time" class="font-semibold text-slate-900">~ 0m</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-500">Speaking Time</span>
                        <span id="speak-time" class="font-semibold text-slate-900">~ 0m</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-500">Chars (No Spaces)</span>
                        <span id="char-no-space" class="font-semibold text-slate-900">0</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-500">Avg. Word Length</span>
                        <span id="avg-word" class="font-semibold text-slate-900">0</span>
                    </div>

                    <div class="pt-4 mt-4 border-t">
                        <h5 class="text-xs font-bold text-slate-400 uppercase mb-3">Top Keywords</h5>
                        <div id="keywords" class="flex flex-wrap gap-2">
                            <span class="text-xs text-slate-400 italic">Enter more text...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-sm font-semibold opacity-0 transition-opacity pointer-events-none">
        Text copied to clipboard!
    </div>

    <script>
        const input = document.getElementById('main-input');
        const toast = document.getElementById('toast');

        input.addEventListener('input', updateStats);

        function updateStats() {
            const val = input.value;
            
            // Basic Counts
            const words = val.trim() ? val.trim().split(/\s+/).length : 0;
            const chars = val.length;
            const charsNoSpace = val.replace(/\s/g, '').length;
            const sentences = val.split(/[.!?]+\s/).filter(Boolean).length;
            const paragraphs = val.split(/\n+/).filter(Boolean).length;

            // UI Updates
            document.getElementById('word-count').innerText = words;
            document.getElementById('char-count').innerText = chars;
            document.getElementById('sent-count').innerText = sentences;
            document.getElementById('para-count').innerText = paragraphs;
            document.getElementById('char-no-space').innerText = charsNoSpace;

            // Progress Bar (Arbitrary 5000 limit for demo)
            const progress = Math.min((chars / 5000) * 100, 100);
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('char-limit').innerText = `${chars} / 5000 chars`;

            // Times
            document.getElementById('read-time').innerText = `~ ${Math.ceil(words / 200)}m`;
            document.getElementById('speak-time').innerText = `~ ${Math.ceil(words / 130)}m`;

            // Avg Word Length
            const avg = words > 0 ? (charsNoSpace / words).toFixed(1) : 0;
            document.getElementById('avg-word').innerText = avg;

            // Keywords
            updateKeywords(val);
        }

        function updateKeywords(text) {
            const container = document.getElementById('keywords');
            if (text.length < 20) {
                container.innerHTML = `<span class="text-xs text-slate-400 italic">Enter more text...</span>`;
                return;
            }

            const wordMap = {};
            const cleanWords = text.toLowerCase().match(/\b(\w+)\b/g);
            
            if (!cleanWords) return;

            cleanWords.forEach(w => {
                if (w.length > 3) { // Only count words > 3 chars
                    wordMap[w] = (wordMap[w] || 0) + 1;
                }
            });

            const sorted = Object.entries(wordMap)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3);

            container.innerHTML = sorted.map(([word, count]) => `
                <span class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-xs font-bold border border-blue-100">
                    ${word} (${count})
                </span>
            `).join('');
        }

        function transform(type) {
            let val = input.value;
            if (type === 'upper') val = val.toUpperCase();
            if (type === 'lower') val = val.toLowerCase();
            if (type === 'title') {
                val = val.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            }
            input.value = val;
            updateStats();
        }

        function cleanSpaces() {
            input.value = input.value.replace(/\s+/g, ' ').trim();
            updateStats();
        }

        function clearAll() {
            input.value = '';
            updateStats();
        }

        function copyText() {
            if (!input.value) return;
            navigator.clipboard.writeText(input.value);
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }
    </script>
</body>
</html>
