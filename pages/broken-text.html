<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Text Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9d00ff;
            --secondary: #00d4ff;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(157, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.15) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            text-align: center;
            opacity: 0.6;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1.1rem;
            font-family: 'Space Grotesk', sans-serif;
            resize: vertical;
            min-height: 120px;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.3);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 16px;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .checkbox-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .output-container {
            position: relative;
        }

        #output {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            min-height: 100px;
            word-wrap: break-word;
            font-size: 1.4rem;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }

        .button-row {
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Space Grotesk', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), #7000ff);
            color: white;
            box-shadow: 0 10px 20px rgba(157, 0, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(157, 0, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--secondary);
            color: #000;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 700;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Głitch Gêneratør</h1>
        <p class="subtitle">Transform normal text into a corrupted digital mess</p>

        <div class="input-group">
            <label for="input">Input Text</label>
            <textarea id="input" placeholder="Type something to corrupt..."></textarea>
        </div>

        <div class="controls">
            <div class="control-item">
                <label>Corruption Level: <span id="lvl-val">5</span></label>
                <input type="range" id="intensity" min="1" max="20" value="5">
            </div>
            <div class="control-item">
                <label>Directions</label>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" id="up" checked> Up</label>
                    <label class="checkbox-item"><input type="checkbox" id="mid" checked> Mid</label>
                    <label class="checkbox-item"><input type="checkbox" id="down" checked> Down</label>
                </div>
            </div>
        </div>

        <label>Result</label>
        <div id="output">Output will appear here...</div>

        <div class="button-row">
            <button class="btn-primary" onclick="copyText()">Copy To Clipboard</button>
            <button class="btn-secondary" onclick="clearAll()">Clear</button>
        </div>
    </div>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const intensity = document.getElementById('intensity');
        const lvlVal = document.getElementById('lvl-val');
        
        // Zalgo character sets
        const up = ['\u030d', '\u030e', '\u0304', '\u0305', '\u033f', '\u0311', '\u0306', '\u0310', '\u0352', '\u0357', '\u0351', '\u0307', '\u0308', '\u030a', '\u0342', '\u0343', '\u0344', '\u034a', '\u034b', '\u034c', '\u0303', '\u0302', '\u030c', '\u0350', '\u0300', '\u0301', '\u030b', '\u030f', '\u0312', '\u0313', '\u0314', '\u033d', '\u0309', '\u0363', '\u0364', '\u0365', '\u0366', '\u0367', '\u0368', '\u0369', '\u036a', '\u036b', '\u036c', '\u036d', '\u036e', '\u036f', '\u033e', '\u035b', '\u0346', '\u031a'];
        const mid = ['\u0315', '\u031b', '\u0340', '\u0341', '\u0358', '\u0321', '\u0322', '\u0327', '\u0328', '\u0334', '\u0335', '\u0336', '\u034f', '\u035c', '\u035d', '\u035e', '\u035f', '\u0360', '\u0362', '\u0338', '\u0337', '\u0361', '\u0489'];
        const down = ['\u0316', '\u0317', '\u0318', '\u0319', '\u031c', '\u031d', '\u031e', '\u031f', '\u0320', '\u0324', '\u0325', '\u0326', '\u0329', '\u032a', '\u032b', '\u032c', '\u032d', '\u032e', '\u032f', '\u0330', '\u0331', '\u0332', '\u0333', '\u0339', '\u033a', '\u033b', '\u033c', '\u0345', '\u0347', '\u0348', '\u0349', '\u034d', '\u034e', '\u0353', '\u0354', '\u0355', '\u0356', '\u0359', '\u035a', '\u0323'];

        function generate() {
            const text = input.value;
            if (!text) {
                output.innerText = "Output will appear here...";
                return;
            }

            let result = "";
            const count = parseInt(intensity.value);
            const useUp = document.getElementById('up').checked;
            const useMid = document.getElementById('mid').checked;
            const useDown = document.getElementById('down').checked;

            for (let i = 0; i < text.length; i++) {
                result += text[i];
                
                // Skip if it's a newline or space (optional, but looks better)
                if (text[i] === '\n') continue;

                for (let j = 0; j < count; j++) {
                    if (useUp) result += up[Math.floor(Math.random() * up.length)];
                    if (useMid) result += mid[Math.floor(Math.random() * mid.length)];
                    if (useDown) result += down[Math.floor(Math.random() * down.length)];
                }
            }
            output.innerText = result;
        }

        function copyText() {
            const text = output.innerText;
            if (text === "Output will appear here...") return;
            
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 2000);
            });
        }

        function clearAll() {
            input.value = "";
            generate();
        }

        // Event Listeners
        input.addEventListener('input', generate);
        intensity.addEventListener('input', () => {
            lvlVal.innerText = intensity.value;
            generate();
        });
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', generate);
        });
    </script>
</body>
</html>
