<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBox TTS | Premium Speech Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg-dark: #0f172a; }
        body { font-family: 'Outfit', sans-serif; transition: all 0.3s ease; }
        .box-shadow { box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .dark .box-shadow { box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* Audio Visualizer */
        .vis-bar { width: 3px; height: 8px; background: var(--primary); border-radius: 10px; }
        .playing .vis-bar { animation: wave 1s ease-in-out infinite; }
        .vis-bar:nth-child(2) { animation-delay: 0.1s; }
        .vis-bar:nth-child(3) { animation-delay: 0.2s; }
        .vis-bar:nth-child(4) { animation-delay: 0.3s; }
        @keyframes wave { 0%, 100% { height: 8px; } 50% { height: 24px; } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">

    <!-- Compatibility Overlay -->
    <div id="errorScreen" class="hidden fixed inset-0 z-50 bg-white dark:bg-slate-950 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-20 h-20 bg-red-100 text-red-600 rounded-2xl flex items-center justify-center mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <h2 class="text-2xl font-bold mb-2">Speech Not Supported</h2>
        <p class="text-slate-500 max-w-sm">Your browser does not support the Web Speech API. Please try Chrome, Edge, or Safari.</p>
    </div>

    <!-- Main App Container -->
    <main id="app" class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-12 gap-6 opacity-0 transition-opacity duration-500">
        
        <!-- Left Panel: Editor -->
        <div class="lg:col-span-8 flex flex-col gap-6">
            <div class="bg-white dark:bg-slate-900 rounded-[2rem] p-8 box-shadow border border-slate-200 dark:border-slate-800 relative overflow-hidden">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black text-xl">MB</div>
                        <div>
                            <h1 class="text-xl font-extrabold tracking-tight">MyBox <span class="text-indigo-600 font-medium">TTS</span></h1>
                            <div class="flex items-center gap-2">
                                <span id="status" class="w-2 h-2 bg-slate-300 rounded-full"></span>
                                <span id="statusText" class="text-[10px] uppercase font-bold tracking-widest text-slate-400">Ready</span>
                            </div>
                        </div>
                    </div>
                    <div id="visualizer" class="flex items-end gap-1 h-6">
                        <div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div>
                    </div>
                </div>

                <textarea id="textInput" 
                    class="w-full h-80 bg-transparent text-lg md:text-2xl font-light leading-relaxed outline-none resize-none placeholder:text-slate-300 dark:placeholder:text-slate-700"
                    placeholder="Type something here to hear it..."></textarea>

                <div class="mt-6 pt-6 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center text-sm font-medium text-slate-400">
                    <div class="flex gap-4">
                        <span>Words: <b id="wCount" class="text-slate-900 dark:text-white">0</b></span>
                        <span>Time: <b id="eTime" class="text-slate-900 dark:text-white">0s</b></span>
                    </div>
                    <button onclick="clearText()" class="hover:text-red-500 transition uppercase tracking-tighter font-bold">Clear All</button>
                </div>
            </div>

            <!-- Controls -->
            <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] box-shadow flex items-center justify-center gap-6 border border-slate-200 dark:border-slate-800">
                <button onclick="stopSpeech()" class="w-12 h-12 rounded-full flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400 hover:text-red-500 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
                </button>
                <button id="playBtn" onclick="toggleSpeech()" class="w-20 h-20 bg-indigo-600 hover:bg-indigo-500 text-white rounded-[2rem] flex items-center justify-center shadow-xl shadow-indigo-500/40 hover:scale-105 active:scale-95 transition">
                    <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="m7 3 14 9-14 9V3z"/></svg>
                    <svg id="pauseIcon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
                </button>
                <button onclick="copyToClipboard()" class="w-12 h-12 rounded-full flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
            </div>
        </div>

        <!-- Right Panel: Settings -->
        <aside class="lg:col-span-4 space-y-6">
            <div class="bg-white dark:bg-slate-900 rounded-[2rem] p-8 box-shadow border border-slate-200 dark:border-slate-800">
                <h3 class="text-sm font-black uppercase tracking-widest text-indigo-600 mb-6">Voice Settings</h3>
                
                <div class="space-y-8">
                    <div>
                        <label class="text-xs font-bold text-slate-400 block mb-3 uppercase">Selected Voice</label>
                        <select id="voiceSelect" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl p-4 text-sm font-semibold outline-none ring-2 ring-transparent focus:ring-indigo-500 transition appearance-none cursor-pointer"></select>
                    </div>

                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <label class="text-xs font-bold text-slate-400 uppercase">Speed</label>
                            <span id="rateVal" class="text-sm font-black text-indigo-600">1.0x</span>
                        </div>
                        <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1" class="w-full accent-indigo-600">
                    </div>

                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <label class="text-xs font-bold text-slate-400 uppercase">Pitch</label>
                            <span id="pitchVal" class="text-sm font-black text-indigo-600">1.0x</span>
                        </div>
                        <input type="range" id="pitch" min="0" max="2" step="0.1" value="1" class="w-full accent-indigo-600">
                    </div>
                </div>
            </div>

            <button onclick="document.body.classList.toggle('dark')" class="w-full py-4 bg-slate-200 dark:bg-slate-800 rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-indigo-600 hover:text-white transition">
                Toggle Dark Mode
            </button>
        </aside>
    </main>

    <script>
        // 1. Initial Compatibility Check
        const synth = window.speechSynthesis;
        const errorScreen = document.getElementById('errorScreen');
        const app = document.getElementById('app');

        if (!synth) {
            errorScreen.classList.remove('hidden');
        } else {
            app.classList.remove('opacity-0');
        }

        const textInput = document.getElementById('textInput');
        const voiceSelect = document.getElementById('voiceSelect');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const visualizer = document.getElementById('visualizer');
        const statusDot = document.getElementById('status');
        const statusText = document.getElementById('statusText');

        let voices = [];

        // 2. Fixed Voice Loading (The "getVoices" fix)
        function loadVoices() {
            voices = synth.getVoices();
            if (voices.length === 0) return; // Wait for next trigger if empty

            voiceSelect.innerHTML = voices
                .map((voice, i) => `<option value="${i}">${voice.name} (${voice.lang})</option>`)
                .join('');
        }

        // Chrome loads voices asynchronously
        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = loadVoices;
        }
        loadVoices(); // Initial call for Safari/Firefox

        function updateUI(state) {
            if (state === 'speaking') {
                visualizer.classList.add('playing');
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                statusDot.className = "w-2 h-2 bg-indigo-500 rounded-full shadow-[0_0_8px_#6366f1]";
                statusText.innerText = "Speaking";
            } else if (state === 'paused') {
                visualizer.classList.remove('playing');
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                statusText.innerText = "Paused";
            } else {
                visualizer.classList.remove('playing');
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                statusDot.className = "w-2 h-2 bg-slate-300 rounded-full";
                statusText.innerText = "Ready";
            }
        }

        function toggleSpeech() {
            if (synth.speaking && !synth.paused) {
                synth.pause();
                updateUI('paused');
            } else if (synth.paused) {
                synth.resume();
                updateUI('speaking');
            } else {
                startSpeech();
            }
        }

        function startSpeech() {
            if (textInput.value.trim() === "") return;
            
            synth.cancel(); // Reset any existing speech

            const utter = new SpeechSynthesisUtterance(textInput.value);
            utter.voice = voices[voiceSelect.value];
            utter.rate = document.getElementById('rate').value;
            utter.pitch = document.getElementById('pitch').value;

            utter.onstart = () => updateUI('speaking');
            utter.onend = () => updateUI('ready');
            utter.onerror = () => updateUI('ready');

            synth.speak(utter);
        }

        function stopSpeech() {
            synth.cancel();
            updateUI('ready');
        }

        // UI Listeners
        textInput.addEventListener('input', () => {
            const text = textInput.value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            document.getElementById('wCount').innerText = words;
            document.getElementById('eTime').innerText = Math.round((words / 150) * 60) + 's';
        });

        document.getElementById('rate').addEventListener('input', (e) => {
            document.getElementById('rateVal').innerText = e.target.value + 'x';
        });

        document.getElementById('pitch').addEventListener('input', (e) => {
            document.getElementById('pitchVal').innerText = e.target.value + 'x';
        });

        function clearText() {
            textInput.value = "";
            stopSpeech();
            textInput.dispatchEvent(new Event('input'));
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(textInput.value);
            alert("Text copied!");
        }
    </script>
</body>
</html>
