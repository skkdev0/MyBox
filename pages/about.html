<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* (PURA CSS WAHI HAIN JO PICHLI BAAR THA, EK BHI LINE CHANGE NAHI HAI) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; line-height: 1.6; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 420px; background: rgba(25, 25, 35, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px 30px; border-radius: 35px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .avatar { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #00f2fe, #4facfe); display: flex; align-items: center; justify-content: center; border: 4px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 25px rgba(79, 172, 254, 0.5); margin-bottom: 20px; background-size: cover; background-position: center; }
        .avatar-letter { font-size: 50px; font-weight: 700; color: #fff; }
        .name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .name { font-size: 26px; font-weight: 700; color: #fff; text-align: center; }
        .verified svg { width: 20px; height: 20px; }
        .subtitle { font-size: 13px; font-weight: 500; color: #a0a0b5; text-align: center; margin-bottom: 30px; background: rgba(255,255,255,0.05); padding: 6px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .card { width: 100%; padding: 16px 20px; border-radius: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .card:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
        .card.youtube:hover { box-shadow: 0 10px 20px rgba(255, 0, 0, 0.2); }
        .card.telegram:hover { box-shadow: 0 10px 20px rgba(0, 136, 204, 0.2); }
        .card-icon { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }
        .card-title { font-size: 15px; font-weight: 600; color: #fff; }
        .about-box { width: 100%; padding: 25px; margin-top: 15px; background: rgba(0, 0, 0, 0.2); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: center; }
        .about-title { font-size: 14px; font-weight: 600; color: #4facfe; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .about-text { font-size: 13px; color: #b0b0c0; }
        .footer { font-size: 11px; color: #666; text-align: center; margin-top: 30px; }
        .footer span { color: #888; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar" id="avatar-bg">
            <span class="avatar-letter" id="avatar-letter">R</span>
        </div>
        <div class="name-row">
            <span class="name" id="person-name">Rachit Pandey</span>
            <div class="verified">
                <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><circle cx="256" cy="256" r="256" fill="#4facfe"/><path d="M140 260l72 72 160-160" fill="none" stroke="#fff" stroke-width="45" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
        </div>
        <div class="subtitle" id="subtitle">Developer & Creator</div>
        
        <div class="card youtube" id="yt-card">
            <div class="card-icon"><svg viewBox="0 0 24 24" fill="#ff4b4b"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></div>
            <span class="card-title">Watch on YouTube</span>
        </div>
        
        <div class="card telegram" id="tg-card">
            <div class="card-icon"><svg viewBox="0 0 24 24" fill="#00a8ff"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.882-.666 3.453-1.504 5.76-2.498 6.92-2.983 3.295-1.378 3.98-1.616 4.426-1.623z"/></svg></div>
            <span class="card-title">Join Telegram</span>
        </div>        
        
        <div class="about-box" id="about-box">
            <div class="about-title">About Me</div>
            <p class="about-text" id="about-text">Building awesome tools and writing clean code.</p>
        </div>
        
        <p class="footer">Created by <span id="footer-name">Rachit</span></p>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            
            // MAGIC DECODER: URL mein "?d=" parameter dhundo
            const encodedData = params.get('d');

            if (encodedData) {
                try {
                    // Base64 ko decode karke JSON banana
                    const decodedString = decodeURIComponent(atob(encodedData));
                    const data = JSON.parse(decodedString);

                    // Name (data.n)
                    if (data.n) {
                        document.title = data.n;
                        document.getElementById('person-name').textContent = data.n;
                        document.getElementById('footer-name').textContent = data.n.split(' ')[0];
                        document.getElementById('avatar-letter').textContent = data.n.charAt(0).toUpperCase();
                    }

                    // Role (data.r)
                    if (data.r) document.getElementById('subtitle').textContent = data.r;
                    else document.getElementById('subtitle').style.display = 'none';

                    // About (data.a)
                    if (data.a) document.getElementById('about-text').textContent = data.a;
                    else document.getElementById('about-box').style.display = 'none';

                    // YouTube (data.y)
                    if (data.y) document.getElementById('yt-card').onclick = () => window.open(data.y, '_blank');
                    else document.getElementById('yt-card').style.display = 'none';

                    // Telegram (data.t)
                    if (data.t) document.getElementById('tg-card').onclick = () => window.open(data.t, '_blank');
                    else document.getElementById('tg-card').style.display = 'none';

                    // Image (data.i)
                    if (data.i) {
                        const tempImg = new Image();
                        tempImg.onload = () => {
                            document.getElementById('avatar-bg').style.backgroundImage = `url('${data.i}')`;
                            document.getElementById('avatar-letter').style.display = 'none';
                        };
                        tempImg.src = data.i;
                    }
                } catch(e) {
                    console.error("Invalid Secret Code");
                }
            } else {
                // Default Profile fallback
                document.getElementById('yt-card').onclick = () => window.open('https://youtube.com', '_blank');
                document.getElementById('tg-card').onclick = () => window.open('https://t.me', '_blank');
            }
        });
    </script>
</body>
</html>
