<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Profile Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            -webkit-user-select: none; user-select: none;
        }

        .builder-wrapper {
            display: flex; gap: 30px; max-width: 1100px; width: 100%;
            justify-content: center; align-items: flex-start; flex-wrap: wrap;
        }

        /* ================== LEFT: FORM ================== */
        .form-container {
            width: 100%; max-width: 500px; background: #ffffff; padding: 30px 40px;
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            animation: slideInLeft 0.6s ease;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        h1 { text-align: center; color: #1e3c72; font-size: 24px; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #4a4a6a; margin-bottom: 5px; }
        
        input, textarea { 
            width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; 
            font-size: 14px; outline: none; transition: 0.3s; background: #f9f9f9; 
            -webkit-user-select: auto; user-select: auto;
        }
        input:focus, textarea:focus { border-color: #2a5298; background: #fff; box-shadow: 0 0 8px rgba(42, 82, 152, 0.1); }
        textarea { resize: vertical; min-height: 70px; }

        .btn-generate { 
            width: 100%; padding: 15px; background: linear-gradient(135deg, #1e3c72, #2a5298); 
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; 
            cursor: pointer; transition: 0.2s; margin-top: 10px; 
        }
        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(42, 82, 152, 0.3); }

        .output-box { margin-top: 25px; display: none; padding-top: 20px; border-top: 2px dashed #ddd; }
        .result-url { 
            width: 100%; padding: 12px; background: #e8f5e9; border: 1px solid #c8e6c9; 
            color: #2e7d32; border-radius: 10px; font-size: 13px; font-weight: bold; 
            text-align: center; margin-bottom: 15px; outline: none; -webkit-user-select: auto; user-select: auto;
        }

        .action-buttons { display: flex; gap: 10px; }
        .btn-action { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 14px; color: white;}
        .btn-copy { background: #1e3c72; }
        .btn-copy:hover { background: #152b52; }
        .btn-test { background: #4caf50; }
        .btn-test:hover { background: #43a047; }


        /* ================== RIGHT: LIVE PREVIEW ================== */
        .preview-container {
            width: 100%; max-width: 380px;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            border-radius: 35px; padding: 40px 30px; color: #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: flex; flex-direction: column;
            align-items: center; position: relative; animation: slideInRight 0.6s ease;
            border: 8px solid #222;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .preview-badge {
            position: absolute; top: -15px; background: #ff4b4b; color: #fff;
            padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: 700;
            letter-spacing: 1px; box-shadow: 0 5px 10px rgba(255, 75, 75, 0.4);
        }

        .av-bg {
            width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            display: flex; align-items: center; justify-content: center;
            border: 3px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
            margin-bottom: 15px; background-size: cover; background-position: center;
        }
        .av-letter { font-size: 40px; font-weight: 700; color: #fff; }
        .pv-name { font-size: 22px; font-weight: 700; text-align: center; }
        
        .pv-role { 
            font-size: 12px; font-weight: 500; color: #a0a0b5; margin-bottom: 25px; 
            background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .pv-btn {
            width: 100%; padding: 14px 20px; border-radius: 15px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 15px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); font-size: 14px; font-weight: 600;
        }
        .pv-btn svg { width: 25px; height: 25px; }
        
        .pv-about {
            width: 100%; padding: 20px; margin-top: 10px; background: rgba(0, 0, 0, 0.2);
            border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: center;
        }
        .pv-about-title { font-size: 12px; color: #4facfe; margin-bottom: 5px; text-transform: uppercase; font-weight: 600;}
        .pv-about-text { font-size: 12px; color: #b0b0c0; }

        @media (max-width: 850px) { .builder-wrapper { flex-direction: column; align-items: center; } }
    </style>
</head>
<body>

    <div class="builder-wrapper">
        
        <!-- FORM SECTION -->
        <div class="form-container">
            <h1>🚀 Pro Link Maker</h1>
            <p class="subtitle">Generate your smart Profile URL</p>

            <div class="input-group">
                <label>Name</label>
                <!-- Jab tak user naam nahi dalta tab tak placeholder dikhega -->
                <input type="text" id="name" placeholder="E.g. Rahul Singh" oninput="updatePreview()">
            </div>
            <div class="input-group">
                <label>Role / Subtitle</label>
                <input type="text" id="role" placeholder="E.g. Developer & Creator" oninput="updatePreview()">
            </div>
            <div class="input-group">
                <label>Profile Image (Direct URL)</label>
                <input type="url" id="img" placeholder="https://link-to-photo.jpg" oninput="updatePreview()">
            </div>
            <div class="input-group">
                <label>YouTube Link</label>
                <input type="url" id="yt" placeholder="https://youtube.com/..." oninput="updatePreview()">
            </div>
            <div class="input-group">
                <label>Telegram Link</label>
                <input type="url" id="tg" placeholder="https://t.me/..." oninput="updatePreview()">
            </div>
            <div class="input-group">
                <label>About Me</label>
                <textarea id="about" placeholder="Write a short bio..." oninput="updatePreview()"></textarea>
            </div>

            <button class="btn-generate" id="generateBtn" onclick="generateLink()">✨ Generate Link</button>

            <!-- Output Box -->
            <div class="output-box" id="outputBox">
                <label>🎉 Your Link is Ready:</label>
                <input type="text" class="result-url" id="finalUrl" readonly>
                <div class="action-buttons">
                    <button class="btn-action btn-copy" id="copyBtn" onclick="copyToClipboard()">📋 Copy</button>
                    <button class="btn-action btn-test" onclick="testLink()">🌐 Open Live Page</button>
                </div>
            </div>
        </div>

        <!-- LIVE PREVIEW SECTION -->
        <div class="preview-container">
            <div class="preview-badge">LIVE PREVIEW</div>
            
            <div class="av-bg" id="pv-av-bg">
                <span class="av-letter" id="pv-av-letter">R</span>
            </div>
            <div class="pv-name" id="pv-name">Your Name</div>
            <div class="pv-role" id="pv-role" style="display:none;"></div>
            
            <div class="pv-btn" id="pv-yt-btn" style="display:none;">
                <svg viewBox="0 0 24 24" fill="#ff4b4b"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                <span>Watch on YouTube</span>
            </div>
            
            <div class="pv-btn" id="pv-tg-btn" style="display:none;">
                <svg viewBox="0 0 24 24" fill="#00a8ff"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.882-.666 3.453-1.504 5.76-2.498 6.92-2.983 3.295-1.378 3.98-1.616 4.426-1.623z"/></svg>
                <span>Join Telegram</span>
            </div>

            <div class="pv-about" id="pv-about-box" style="display:none;">
                <div class="pv-about-title">About Me</div>
                <div class="pv-about-text" id="pv-about-text"></div>
            </div>
        </div>

    </div>

    <script>
        // ======= LIVE PREVIEW LOGIC =======
        function updatePreview() {
            // Agar naam khali hai toh "Your Name" dikhega, warna jo type karoge wo dikhega
            let inputName = document.getElementById('name').value.trim();
            const displayName = inputName !== "" ? inputName : "Your Name";
            
            const role = document.getElementById('role').value.trim();
            const img = document.getElementById('img').value.trim();
            const yt = document.getElementById('yt').value.trim();
            const tg = document.getElementById('tg').value.trim();
            const about = document.getElementById('about').value.trim();

            // Setup Name & Avatar Letter
            document.getElementById('pv-name').innerText = displayName;
            document.getElementById('pv-av-letter').innerText = displayName.charAt(0).toUpperCase();

            // Agar sirf naam likha hai aur baaki fields empty hain, toh unhe hide karo (Jaise Live page karta hai)
            const roleEl = document.getElementById('pv-role');
            if(role) { roleEl.style.display = 'block'; roleEl.innerText = role; } 
            else { roleEl.style.display = 'none'; }

            const aboutBox = document.getElementById('pv-about-box');
            if(about) { aboutBox.style.display = 'block'; document.getElementById('pv-about-text').innerText = about; } 
            else { aboutBox.style.display = 'none'; }

            // Buttons hide/show
            document.getElementById('pv-yt-btn').style.display = yt ? 'flex' : 'none';
            document.getElementById('pv-tg-btn').style.display = tg ? 'flex' : 'none';

            // Image Setup
            const avBg = document.getElementById('pv-av-bg');
            const avLet = document.getElementById('pv-av-letter');
            if(img) {
                avBg.style.backgroundImage = `url('${img}')`;
                avLet.style.display = 'none';
            } else {
                avBg.style.backgroundImage = 'linear-gradient(135deg, #00f2fe, #4facfe)';
                avLet.style.display = 'block';
            }
        }

        // Page load hone par ek baar preview update karo
        updatePreview();


        // ======= URL GENERATION LOGIC =======
        function generateLink() {
            const btn = document.getElementById('generateBtn');
            btn.innerText = "⏳ Generating...";
            btn.disabled = true;

            const baseUrl = "https://skkdev0.github.io/MyBox/pages/about.html";
            const params = new URLSearchParams();

            const name = document.getElementById('name').value.trim();
            const role = document.getElementById('role').value.trim();
            const img = document.getElementById('img').value.trim();
            const yt = document.getElementById('yt').value.trim();
            const tg = document.getElementById('tg').value.trim();
            const about = document.getElementById('about').value.trim();

            // Jo box me bhara jayega wahi parameter banega
            if (name) params.append('name', name);
            if (role) params.append('role', role);
            if (img) params.append('img', img);
            if (yt) params.append('yt', yt);
            if (tg) params.append('tg', tg);
            if (about) params.append('about', about);

            // FIX: GitHub server browser cache problem ki wajah se purana profile dikhata hai.
            // Hum link me &t=(timestamp) laga rahe hain taki URL hamesha naya baney aur cache break ho jaye.
            params.append('t', Date.now());

            let queryString = params.toString();
            let finalMagicUrl = baseUrl;
            
            if (queryString !== "") {
                finalMagicUrl = baseUrl + "?" + queryString;
            }
            // URL ko safed dikhne ke liye %20 se clean kar diya
            finalMagicUrl = finalMagicUrl.replace(/\+/g, '%20');

            // Show output
            document.getElementById('outputBox').style.display = 'block';
            document.getElementById('finalUrl').value = finalMagicUrl;
            document.getElementById('copyBtn').innerHTML = "📋 Copy Link";
            document.getElementById('copyBtn').style.background = "#1e3c72";
            
            btn.innerText = "✨ Generate Link";
            btn.disabled = false;
        }

        function copyToClipboard() {
            const copyText = document.getElementById("finalUrl");
            copyText.select();
            copyText.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(copyText.value).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerHTML = "✅ Copied!";
                btn.style.background = "#4caf50"; 
            });
        }

        function testLink() {
            const finalUrl = document.getElementById("finalUrl").value;
            if(finalUrl) window.open(finalUrl, '_blank');
        }
    </script>
</body>
</html>
