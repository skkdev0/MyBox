<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Link Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #0ea5e9;
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --success: #22c55e;
      --error: #ef4444;
      --shadow: 0 10px 40px -10px rgba(0,0,0,0.15);
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text-primary);
    }
    .container {
      width: 100%;
      max-width: 640px;
      background: var(--card-bg);
      padding: 32px 40px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .header { text-align: center; margin-bottom: 28px; }
    .header h1 { font-size: 26px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .header p { font-size: 14px; color: var(--text-secondary); }
    .input-group { margin-bottom: 18px; }
    .input-group label {      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .input-group label .star { color: var(--error); }
    input, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
      background: #f8fafc;
    }
    input:focus, textarea:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(99,102,241,0.1);
    }
    textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
    .btn-generate {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(99,102,241,0.4);
    }
    .btn-generate:active { transform: translateY(0); }
    .output-box {
      margin-top: 28px;      padding-top: 24px;
      border-top: 2px dashed var(--border);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .output-box label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    .result-url {
      width: 100%;
      padding: 14px 16px;
      background: #f0fdf4;
      border: 2px solid #bbf7d0;
      color: #166534;
      border-radius: 12px;
      font-size: 13px;
      word-break: break-all;
      margin-bottom: 14px;
      font-family: 'Inter', monospace;
      line-height: 1.4;
    }
    .action-buttons { display: flex; gap: 12px; }
    .btn-action {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-copy { background: var(--text-primary); color: white; }
    .btn-copy:hover { background: #334155; }
    .btn-copy.copied { background: var(--success); }
    .btn-test { background: var(--success); color: white; }
    .btn-test:hover { background: #16a34a; }
    .info-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;      color: var(--text-secondary);
      background: #f1f5f9;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 12px;
    }
    .preview-toggle {
      text-align: center;
      margin: 20px 0 10px;
    }
    .preview-toggle button {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .preview-card {
      background: #f8fafc;
      border-radius: 16px;
      padding: 20px;
      margin-top: 16px;
      border: 2px solid var(--border);
      display: none;
    }
    .preview-card.show { display: block; animation: slideUp 0.3s ease; }
    .preview-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--border); margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; color: var(--text-secondary);
    }
    .preview-name { font-weight: 700; font-size: 18px; color: var(--text-primary); text-align: center; }
    .preview-role { font-size: 14px; color: var(--text-secondary); text-align: center; margin-top: 4px; }
    .preview-about {
      margin-top: 16px; padding: 12px; background: #fff;
      border-radius: 10px; font-size: 13px; color: var(--text-primary);
      white-space: pre-wrap; line-height: 1.5;
    }
    @media (max-width: 640px) {
      .container { padding: 24px 20px; }
      .header h1 { font-size: 22px; }
      .action-buttons { flex-direction: column; }
      .btn-action { width: 100%; }
    }
  </style></head>
<body>
  <div class="container">
    <div class="header">
      <h1>✨ Profile Link Generator</h1>
      <p>Create your smart profile page in seconds</p>
    </div>

    <div class="input-group">
      <label>📍 Profile Viewer URL <span class="star">*</span></label>
      <input type="text" id="viewUrl" value="https://skkdev0.github.io/MyBox/pages/view.html" placeholder="https://.../view.html" required>
    </div>

    <div class="input-group">
      <label>👤 Full Name</label>
      <input type="text" id="name" placeholder="Your name">
    </div>
    <div class="input-group">
      <label>💼 Role / Title</label>
      <input type="text" id="role" placeholder="e.g., Developer">
    </div>
    <div class="input-group">
      <label>🖼️ Profile Image URL</label>
      <input type="url" id="img" placeholder="https://.../photo.jpg">
    </div>
    <div class="input-group">
      <label>📺 YouTube</label>
      <input type="url" id="yt" placeholder="https://youtube.com/@...">
    </div>
    <div class="input-group">
      <label>✈️ Telegram</label>
      <input type="url" id="tg" placeholder="https://t.me/...">
    </div>
    <div class="input-group">
      <label>📝 About</label>
      <textarea id="about" placeholder="Tell about yourself..."></textarea>
    </div>

    <button class="btn-generate" onclick="generateLink()">
      <span>✨</span> Generate Profile Link
    </button>

    <div class="preview-toggle">
      <button type="button" onclick="togglePreview()">👁️ Preview Profile</button>
    </div>
    <div class="preview-card" id="previewCard">
      <div class="preview-avatar" id="previewAvatar">👤</div>
      <div class="preview-name" id="previewName"></div>
      <div class="preview-role" id="previewRole"></div>
      <div class="preview-about" id="previewAbout"></div>    </div>

    <div class="output-box" id="outputBox" style="display:none;">
      <label>🎉 Your Profile Link is Ready:</label>
      <textarea class="result-url" id="finalUrl" readonly rows="3"></textarea>
      <div class="info-badge">🔐 Secure • Multi-line • Emoji Safe</div>
      <div class="action-buttons">
        <button class="btn-action btn-copy" id="copyBtn" onclick="copyToClipboard()">
          <span>📋</span> Copy Link
        </button>
        <button class="btn-action btn-test" onclick="testLink()">
          <span>🌐</span> Open
        </button>
      </div>
    </div>
  </div>

  <script>
    function utf8ToBase64(str) { return btoa(unescape(encodeURIComponent(str))); }
    function generateLink() {
      const viewUrl = document.getElementById('viewUrl').value.trim();
      if (!viewUrl) { alert("Please enter Profile Viewer URL"); document.getElementById('viewUrl').focus(); return; }
      const profileData = {
        name: document.getElementById('name').value.trim(),
        role: document.getElementById('role').value.trim(),
        img: document.getElementById('img').value.trim(),
        yt: document.getElementById('yt').value.trim(),
        tg: document.getElementById('tg').value.trim(),
        about: document.getElementById('about').value
      };
      Object.keys(profileData).forEach(key => { if (!profileData[key]) delete profileData[key]; });
      if (Object.keys(profileData).length === 0) { alert("Please fill at least one field"); return; }
      const jsonString = JSON.stringify(profileData);
      const encoded = utf8ToBase64(jsonString);
      const cleanViewUrl = viewUrl.split('?')[0];
      const finalUrl = `${cleanViewUrl}?a=${encodeURIComponent(encoded)}`;
      document.getElementById('outputBox').style.display = 'block';
      document.getElementById('finalUrl').value = finalUrl;
      const btn = document.getElementById('copyBtn');
      btn.innerHTML = '<span>📋</span> Copy Link';
      btn.classList.remove('copied');
      btn.style.background = '';
      updatePreview();
    }
    function copyToClipboard() {
      const copyText = document.getElementById("finalUrl");
      copyText.select();
      copyText.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(copyText.value).then(() => {
        const btn = document.getElementById('copyBtn');        btn.innerHTML = '<span>✅</span> Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.innerHTML = '<span>📋</span> Copy Link'; btn.classList.remove('copied'); }, 2000);
      });
    }
    function testLink() { const url = document.getElementById("finalUrl").value; if (url) window.open(url, '_blank'); }
    function togglePreview() {
      const card = document.getElementById('previewCard');
      card.classList.toggle('show');
      if (card.classList.contains('show')) updatePreview();
    }
    function updatePreview() {
      const name = document.getElementById('name').value.trim();
      const role = document.getElementById('role').value.trim();
      const about = document.getElementById('about').value.trim();
      const img = document.getElementById('img').value.trim();
      if (name) document.getElementById('previewName').textContent = name;
      else document.getElementById('previewName').textContent = 'Your Name';
      document.getElementById('previewRole').textContent = role || 'Your Role';
      document.getElementById('previewAbout').textContent = about || 'Your about section will appear here...';
      const avatar = document.getElementById('previewAvatar');
      if (img) { avatar.style.backgroundImage = `url(${img})`; avatar.style.backgroundSize = 'cover'; avatar.style.backgroundPosition = 'center'; avatar.textContent = ''; }
      else { avatar.style.backgroundImage = ''; avatar.textContent = '👤'; }
    }
    ['name','role','about','img'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        if (document.getElementById('previewCard').classList.contains('show')) updatePreview();
      });
    });
  </script>
</body>
</html>
