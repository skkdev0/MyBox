<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your professional profile link instantly">
  <meta name="theme-color" content="#6366f1">
  <title>Profile Link Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #0ea5e9;
      --bg-light: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
      --bg-dark: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card-light: #ffffff; --card-dark: #1e293b;
      --text-primary-light: #1e293b; --text-primary-dark: #f1f5f9;
      --text-secondary-light: #64748b; --text-secondary-dark: #94a3b8;
      --border-light: #e2e8f0; --border-dark: #334155;
      --success: #22c55e; --error: #ef4444; --warning: #f59e0b;
      --shadow-light: 0 10px 40px -10px rgba(0,0,0,0.1);
      --shadow-dark: 0 10px 40px -10px rgba(0,0,0,0.4);
      --radius: 20px; --radius-sm: 12px;
    }
    [data-theme="dark"] {
      --bg-gradient: var(--bg-dark); --card-bg: var(--card-dark);
      --text-primary: var(--text-primary-dark); --text-secondary: var(--text-secondary-dark);
      --border: var(--border-dark); --shadow: var(--shadow-dark);
    }
    [data-theme="light"] {
      --bg-gradient: var(--bg-light); --card-bg: var(--card-light);
      --text-primary: var(--text-primary-light); --text-secondary: var(--text-secondary-light);
      --border: var(--border-light); --shadow: var(--shadow-light);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      background: var(--bg-gradient); min-height: 100vh; display: flex;
      justify-content: center; align-items: center; padding: 20px;
      color: var(--text-primary); transition: background 0.3s, color 0.3s;
    }
    .container {
      width: 100%; max-width: 680px; background: var(--card-bg);
      padding: 36px 40px; border-radius: var(--radius);
      box-shadow: var(--shadow); animation: slideUp 0.4s ease;
      border: 1px solid var(--border);
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; gap: 16px; }
    .header-text h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .header-text p { font-size: 14px; color: var(--text-secondary); }
    .theme-toggle {      background: var(--border); border: none; width: 44px; height: 44px;
      border-radius: 12px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 18px; transition: all 0.2s;
      color: var(--text-primary);
    }
    .theme-toggle:hover { background: var(--primary); color: white; transform: rotate(15deg); }
    .progress-bar {
      height: 4px; background: var(--border); border-radius: 2px;
      margin: 0 0 24px 0; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary));
      width: 0%; transition: width 0.3s ease; border-radius: 2px;
    }
    .input-group { margin-bottom: 16px; }
    .input-group label {
      display: flex; align-items: center; gap: 8px; font-size: 13px;
      font-weight: 600; color: var(--text-primary); margin-bottom: 8px;
    }
    .input-group label .required { color: var(--error); }
    .input-wrapper { position: relative; }
    input, textarea {
      width: 100%; padding: 14px 16px; border: 2px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; outline: none;
      transition: all 0.2s; background: var(--card-bg); color: var(--text-primary);
    }
    input:focus, textarea:focus {
      border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
    }
    input.invalid { border-color: var(--error); }
    input.valid { border-color: var(--success); }
    .validation-icon {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 16px; display: none;
    }
    input.invalid + .validation-icon { display: block; color: var(--error); }
    input.valid + .validation-icon { display: block; color: var(--success); }
    textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
    .char-counter {
      text-align: right; font-size: 11px; color: var(--text-secondary);
      margin-top: 4px;
    }
    .image-preview {
      width: 64px; height: 64px; border-radius: 50%; margin: 12px 0;
      background: var(--border); display: flex; align-items: center;
      justify-content: center; font-size: 24px; overflow: hidden;
      border: 3px solid var(--primary);
    }
    .image-preview img { width: 100%; height: 100%; object-fit: cover; }
    .btn-generate {      width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; border: none; border-radius: var(--radius-sm);
      font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s;
      margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(99,102,241,0.4); }
    .btn-generate:active { transform: translateY(0); }
    .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .output-box {
      margin-top: 28px; padding-top: 24px; border-top: 2px dashed var(--border);
      animation: fadeIn 0.3s ease; display: none;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .output-box label {
      display: block; font-size: 13px; font-weight: 600; color: var(--text-primary);
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .result-url {
      width: 100%; padding: 14px 16px; background: rgba(34,197,94,0.1);
      border: 2px solid rgba(34,197,94,0.3); color: var(--success);
      border-radius: var(--radius-sm); font-size: 13px; word-break: break-all;
      margin-bottom: 14px; font-family: 'Inter', monospace; line-height: 1.4;
    }
    .action-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-action {
      flex: 1; min-width: 120px; padding: 14px; border: none;
      border-radius: var(--radius-sm); font-weight: 600; cursor: pointer;
      transition: all 0.2s; font-size: 14px; display: flex; align-items: center;
      justify-content: center; gap: 6px;
    }
    .btn-copy { background: var(--text-primary); color: var(--card-bg); }
    .btn-copy:hover { background: #334155; }
    .btn-copy.copied { background: var(--success); color: white; }
    .btn-test { background: var(--success); color: white; }
    .btn-test:hover { background: #16a34a; }
    .btn-qr { background: var(--secondary); color: white; }
    .btn-qr:hover { background: #0284c7; }
    .btn-reset { background: var(--border); color: var(--text-primary); }
    .btn-reset:hover { background: var(--error); color: white; }
    .info-badge {
      display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
      color: var(--text-secondary); background: var(--border);
      padding: 8px 14px; border-radius: 10px; margin-top: 12px;
    }
    .preview-section {
      margin: 24px 0 16px; text-align: center;
    }
    .preview-toggle {
      background: none; border: none; color: var(--primary);
      font-size: 14px; font-weight: 600; cursor: pointer;      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 10px;
      transition: background 0.2s;
    }
    .preview-toggle:hover { background: rgba(99,102,241,0.1); }
    .preview-card {
      background: var(--border); border-radius: var(--radius);
      padding: 24px; margin-top: 16px; border: 2px solid var(--border);
      display: none; animation: slideUp 0.3s ease;
    }
    .preview-card.show { display: block; }
    .preview-avatar {
      width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 16px;
      background: var(--card-bg); display: flex; align-items: center;
      justify-content: center; font-size: 28px; border: 3px solid var(--primary);
      overflow: hidden;
    }
    .preview-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .preview-name { font-weight: 700; font-size: 18px; color: var(--text-primary); }
    .preview-role { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .preview-about {
      margin-top: 16px; padding: 12px; background: var(--card-bg);
      border-radius: 10px; font-size: 13px; color: var(--text-primary);
      white-space: pre-wrap; line-height: 1.5; text-align: left;
    }
    .qr-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px; animation: fadeIn 0.2s;
    }
    .qr-modal.show { display: flex; }
    .qr-content {
      background: var(--card-bg); padding: 24px; border-radius: var(--radius);
      text-align: center; max-width: 320px; width: 100%;
      border: 1px solid var(--border);
    }
    .qr-code {
      width: 200px; height: 200px; margin: 0 auto 16px;
      background: var(--border); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 64px;
    }
    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--text-primary);
      color: var(--card-bg); padding: 14px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 500; display: flex; align-items: center;
      gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1001;
      animation: slideIn 0.3s ease; max-width: 320px;
    }
    .toast.success { background: var(--success); color: white; }    .toast.error { background: var(--error); color: white; }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .shortcut-hint {
      font-size: 11px; color: var(--text-secondary); text-align: center;
      margin-top: 16px; padding: 8px; background: var(--border);
      border-radius: 8px;
    }
    .shortcut-hint kbd {
      background: var(--card-bg); padding: 2px 6px; border-radius: 4px;
      border: 1px solid var(--border); font-family: monospace;
    }
    @media (max-width: 640px) {
      .container { padding: 28px 20px; }
      .header { flex-direction: column; align-items: center; text-align: center; }
      .action-buttons { flex-direction: column; }
      .btn-action { width: 100%; }
      .toast { left: 20px; right: 20px; justify-content: center; }
    }
    @media print {
      body { background: white; }
      .container { box-shadow: none; border: none; }
      .btn-generate, .action-buttons, .preview-toggle, .theme-toggle { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-text">
        <h1>✨ Profile Link Generator</h1>
        <p>Create your smart profile in seconds</p>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="input-group">
      <label>📍 Profile Viewer URL <span class="required">*</span></label>
      <div class="input-wrapper">
        <input type="url" id="viewUrl" value="https://skkdev0.github.io/MyBox/pages/view.html" placeholder="https://.../view.html" required aria-describedby="urlHint">
        <span class="validation-icon">✓</span>
      </div>
      <small id="urlHint" style="color:var(--text-secondary);font-size:11px;">Must be a valid https URL</small>
    </div>

    <div class="input-group">
      <label>👤 Full Name</label>
      <input type="text" id="name" placeholder="Your name" maxlength="50">
      <div class="char-counter"><span id="nameCount">0</span>/50</div>    </div>

    <div class="input-group">
      <label>💼 Role / Title</label>
      <input type="text" id="role" placeholder="e.g., Developer" maxlength="60">
      <div class="char-counter"><span id="roleCount">0</span>/60</div>
    </div>

    <div class="input-group">
      <label>🖼️ Profile Image URL</label>
      <div class="input-wrapper">
        <input type="url" id="img" placeholder="https://.../photo.jpg">
        <span class="validation-icon">✓</span>
      </div>
      <div class="image-preview" id="imgPreview">👤</div>
    </div>

    <div class="input-group">
      <label>📺 YouTube</label>
      <div class="input-wrapper">
        <input type="url" id="yt" placeholder="https://youtube.com/@...">
        <span class="validation-icon">✓</span>
      </div>
    </div>

    <div class="input-group">
      <label>✈️ Telegram</label>
      <div class="input-wrapper">
        <input type="url" id="tg" placeholder="https://t.me/...">
        <span class="validation-icon">✓</span>
      </div>
    </div>

    <div class="input-group">
      <label>📝 About</label>
      <textarea id="about" placeholder="Tell about yourself..." maxlength="300"></textarea>
      <div class="char-counter"><span id="aboutCount">0</span>/300</div>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="generateLink()">
      <span>✨</span> Generate Profile Link
    </button>

    <div class="preview-section">
      <button type="button" class="preview-toggle" onclick="togglePreview()">👁️ Live Preview</button>
    </div>
    <div class="preview-card" id="previewCard">
      <div class="preview-avatar" id="previewAvatar"><span>👤</span></div>
      <div class="preview-name" id="previewName">Your Name</div>
      <div class="preview-role" id="previewRole">Your Role</div>      <div class="preview-about" id="previewAbout">Your about section will appear here...</div>
    </div>

    <div class="output-box" id="outputBox">
      <label>🎉 Your Profile Link:</label>
      <textarea class="result-url" id="finalUrl" readonly rows="3"></textarea>
      <div class="info-badge">🔐 Secure • Multi-line • Emoji Ready</div>
      <div class="action-buttons">
        <button class="btn-action btn-copy" id="copyBtn" onclick="copyToClipboard()"><span>📋</span> Copy</button>
        <button class="btn-action btn-test" onclick="testLink()"><span>🌐</span> Open</button>
        <button class="btn-action btn-qr" onclick="showQR()"><span>📱</span> QR</button>
        <button class="btn-action btn-reset" onclick="resetForm()"><span>🔄</span> Reset</button>
      </div>
    </div>

    <div class="shortcut-hint">⌨️ Press <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to generate</div>
  </div>

  <div class="qr-modal" id="qrModal" onclick="hideQR(event)">
    <div class="qr-content">
      <div class="qr-code" id="qrCode">🔲</div>
      <div style="font-weight:600;margin-bottom:8px;">Scan to Open Profile</div>
      <div style="font-size:12px;color:var(--text-secondary);margin-bottom:16px;">Point your camera at the code</div>
      <button class="btn-action btn-copy" onclick="copyQRUrl()" style="width:100%"><span>📋</span> Copy Link</button>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none;"></div>

  <script>
    const $ = id => document.getElementById(id);
    const utf8ToBase64 = str => btoa(unescape(encodeURIComponent(str)));
    const isValidUrl = str => { try { new URL(str); return str.startsWith('https'); } catch { return false; } };
    const showToast = (msg, type = 'success') => {
      const t = $('toast'); t.textContent = msg; t.className = `toast ${type}`; t.style.display = 'flex';
      setTimeout(() => t.style.display = 'none', 3000);
    };
    const updateProgress = () => {
      const fields = ['viewUrl','name','role','img','yt','tg','about'];
      const filled = fields.filter(id => $(id).value.trim()).length;
      $('progressFill').style.width = `${Math.round(filled/fields.length*100)}%`;
    };
    const updateCounters = () => {
      ['name','role','about'].forEach(id => {
        const el = $(id), counter = $(`${id}Count`);
        if (el && counter) counter.textContent = el.value.length;
      });
    };
    const validateUrlInput = (el, icon) => {
      const val = el.value.trim();      if (!val) { el.classList.remove('valid','invalid'); return; }
      if (isValidUrl(val)) { el.classList.add('valid'); el.classList.remove('invalid'); }
      else { el.classList.add('invalid'); el.classList.remove('valid'); }
    };
    const updatePreview = () => {
      const name = $('name').value.trim() || 'Your Name';
      const role = $('role').value.trim() || 'Your Role';
      const about = $('about').value.trim() || 'Your about section will appear here...';
      const img = $('img').value.trim();
      $('previewName').textContent = name;
      $('previewRole').textContent = role;
      $('previewAbout').textContent = about;
      const avatar = $('previewAvatar');
      if (img && isValidUrl(img)) {
        avatar.innerHTML = `<img src="${img}" alt="Preview" onerror="this.parentElement.innerHTML='👤'">`;
      } else { avatar.innerHTML = '<span>👤</span>'; }
    };
    const togglePreview = () => { $('previewCard').classList.toggle('show'); if ($('previewCard').classList.contains('show')) updatePreview(); };
    const generateLink = () => {
      const viewUrl = $('viewUrl').value.trim();
      if (!viewUrl || !isValidUrl(viewUrl)) { showToast('Please enter a valid https URL', 'error'); $('viewUrl').focus(); return; }
      const data = {
        name: $('name').value.trim(), role: $('role').value.trim(), img: $('img').value.trim(),
        yt: $('yt').value.trim(), tg: $('tg').value.trim(), about: $('about').value
      };
      Object.keys(data).forEach(k => { if (!data[k]) delete data[k]; });
      if (!Object.keys(data).length) { showToast('Please fill at least one field', 'error'); return; }
      const encoded = utf8ToBase64(JSON.stringify(data));
      const finalUrl = `${viewUrl.split('?')[0]}?a=${encodeURIComponent(encoded)}`;
      $('outputBox').style.display = 'block';
      $('finalUrl').value = finalUrl;
      $('copyBtn').innerHTML = '<span>📋</span> Copy';
      $('copyBtn').classList.remove('copied');
      localStorage.setItem('profileBuilderData', JSON.stringify(data));
      localStorage.setItem('profileBuilderUrl', finalUrl);
      updatePreview();
      showToast('Link generated successfully!');
    };
    const copyToClipboard = async () => {
      const text = $('finalUrl').value;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        const btn = $('copyBtn');
        btn.innerHTML = '<span>✅</span> Copied!';
        btn.classList.add('copied');
        showToast('Link copied to clipboard!');
        setTimeout(() => { btn.innerHTML = '<span>📋</span> Copy'; btn.classList.remove('copied'); }, 2000);
      } catch { showToast('Failed to copy', 'error'); }
    };    const testLink = () => { const url = $('finalUrl').value; if (url) window.open(url, '_blank'); };
    const showQR = () => {
      const url = $('finalUrl').value;
      if (!url) { showToast('Generate a link first', 'error'); return; }
      $('qrCode').textContent = '🔲';
      $('qrModal').classList.add('show');
      setTimeout(() => {
        const qrText = url.length > 100 ? url.substring(0,97)+'...' : url;
        $('qrCode').innerHTML = `<div style="font-size:11px;text-align:center;padding:10px;line-height:1.3">${qrText}</div>`;
      }, 300);
    };
    const hideQR = e => { if (e.target === $('qrModal')) $('qrModal').classList.remove('show'); };
    const copyQRUrl = () => { copyToClipboard(); showToast('QR link copied!'); };
    const resetForm = () => {
      if (!confirm('Clear all fields?')) return;
      ['name','role','img','yt','tg','about'].forEach(id => $(id).value = '');
      $('viewUrl').value = 'https://skkdev0.github.io/MyBox/pages/profile_view.html';
      $('outputBox').style.display = 'none';
      $('previewCard').classList.remove('show');
      updateProgress(); updateCounters(); updatePreview();
      localStorage.removeItem('profileBuilderData');
      showToast('Form reset');
    };
    const initTheme = () => {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    };
    const toggleTheme = () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    };
    const loadSaved = () => {
      const saved = localStorage.getItem('profileBuilderData');
      if (saved) {
        try {
          const data = JSON.parse(saved);
          Object.keys(data).forEach(k => { if ($(k)) $(k).value = data[k]; });
          updateProgress(); updateCounters(); updatePreview();
        } catch {}
      }
      const savedUrl = localStorage.getItem('profileBuilderUrl');
      if (savedUrl) { $('finalUrl').value = savedUrl; $('outputBox').style.display = 'block'; }
    };
    document.addEventListener('DOMContentLoaded', () => {
      initTheme(); loadSaved(); updateProgress(); updateCounters();
      ['viewUrl','img','yt','tg'].forEach(id => {        $(id).addEventListener('input', e => validateUrlInput(e.target, e.target.nextElementSibling));
        $(id).addEventListener('blur', e => validateUrlInput(e.target, e.target.nextElementSibling));
      });
      ['name','role','about'].forEach(id => $(id).addEventListener('input', () => { updateCounters(); updateProgress(); if ($('previewCard').classList.contains('show')) updatePreview(); }));
      $('img').addEventListener('input', () => { if ($('previewCard').classList.contains('show')) updatePreview(); });
      $('themeToggle').addEventListener('click', toggleTheme);
      document.addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') generateLink(); });
      window.addEventListener('beforeunload', () => {
        const data = { name:$('name').value, role:$('role').value, img:$('img').value, yt:$('yt').value, tg:$('tg').value, about:$('about').value };
        localStorage.setItem('profileBuilderData', JSON.stringify(data));
      });
    });
  </script>
</body>
</html>
