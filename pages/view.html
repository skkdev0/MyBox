<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --bg-gradient: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --success: #22c55e;
      --error: #ef4444;
      --shadow: 0 20px 50px -12px rgba(0,0,0,0.15);
      --radius: 24px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text-primary);
    }
    .profile-card {
      width: 100%;
      max-width: 520px;
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 40px 32px;
      box-shadow: var(--shadow);
      text-align: center;
      animation: cardLoad 0.5s ease;
    }
    @keyframes cardLoad {
      from { opacity: 0; transform: translateY(30px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .profile-header { margin-bottom: 24px; }
    .profile-avatar {
      width: 110px; height: 110px; border-radius: 50%;
      margin: 0 auto 20px; border: 4px solid var(--primary);
      object-fit: cover; background: var(--border);      display: flex; align-items: center; justify-content: center;
      font-size: 40px; color: var(--text-secondary);
      transition: transform 0.3s;
    }
    .profile-avatar:hover { transform: scale(1.05); }
    .profile-name { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .profile-role { font-size: 15px; color: var(--text-secondary); font-weight: 500; }
    .about-section {
      background: #f8fafc; border-radius: 16px; padding: 20px;
      margin: 24px 0; text-align: left; white-space: pre-wrap;
      font-size: 14px; color: var(--text-primary); line-height: 1.7;
      border-left: 4px solid var(--primary);
    }
    .links-section { display: grid; gap: 14px; margin-top: 28px; }
    .link-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 16px 20px; border-radius: 16px; text-decoration: none;
      font-weight: 600; font-size: 15px; transition: all 0.2s;
      color: white; position: relative; overflow: hidden;
    }
    .link-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .link-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
    .link-btn:hover::before { opacity: 1; }
    .yt-btn { background: linear-gradient(135deg, #ff0000, #cc0000); }
    .tg-btn { background: linear-gradient(135deg, #0088cc, #006699); }
    .status-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-top: 28px; font-size: 13px; color: var(--text-secondary);
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .error-state {
      background: #fef2f2; border: 2px solid #fecaca;
      border-radius: 16px; padding: 24px; text-align: center;
      color: var(--error); font-size: 14px; line-height: 1.6;
    }
    .error-state code {
      background: #fee2e2; padding: 2px 6px; border-radius: 4px;
      font-family: monospace; font-size: 12px;
    }
    .footer { margin-top: 32px; font-size: 12px; color: var(--text-secondary); }
    .loading { color: var(--text-secondary); font-style: italic; padding: 40px 20px; }
    @media (max-width: 640px) {
      .profile-card { padding: 32px 24px; }
      .profile-avatar { width: 96px; height: 96px; }
      .profile-name { font-size: 20px; }      .link-btn { padding: 14px 18px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="profile-card" id="profileCard">
    <p class="loading">Loading profile...</p>
  </div>

  <script>
    function base64ToUtf8(str) { return decodeURIComponent(escape(atob(str))); }
    function escapeHtml(text) {
      if (!text) return '';
      const map = { '&': '&', '<': '<', '>': '>', '"': '"', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }
    function loadProfile() {
      const params = new URLSearchParams(window.location.search);
      const encoded = params.get('a');
      const card = document.getElementById('profileCard');
      if (!encoded) {
        card.innerHTML = `<div class="error-state">❌ Profile data not found<br><small>URL must include <code>?a=...</code></small></div><div class="footer">Profile System</div>`;
        return;
      }
      try {
        const decoded = base64ToUtf8(encoded);
        const data = JSON.parse(decoded);
        let html = '<div class="profile-header">';
        if (data.img) {
          html += `<img src="${escapeHtml(data.img)}" alt="Profile" class="profile-avatar" onerror="this.outerHTML='<div class=\\'profile-avatar\\'>👤</div>'">`;
        } else {
          html += `<div class="profile-avatar">👤</div>`;
        }
        if (data.name) html += `<div class="profile-name">${escapeHtml(data.name)}</div>`;
        if (data.role) html += `<div class="profile-role">${escapeHtml(data.role)}</div>`;
        html += '</div>';
        if (data.about) {
          html += `<div class="about-section">${escapeHtml(data.about)}</div>`;
        }
        const links = [];
        if (data.yt) links.push({ url: data.yt, text: '📺 YouTube', cls: 'yt-btn' });
        if (data.tg) links.push({ url: data.tg, text: '✈️ Telegram', cls: 'tg-btn' });
        if (links.length > 0) {
          html += `<div class="links-section">`;
          links.forEach(l => {
            html += `<a href="${escapeHtml(l.url)}" target="_blank" class="link-btn ${l.cls}">${l.text}</a>`;
          });
          html += `</div>`;
        }
        html += `<div class="status-bar"><span class="status-dot"></span> Active Profile</div>`;        html += `<div class="footer">Shared securely</div>`;
        card.innerHTML = html;
      } catch (e) {
        card.innerHTML = `<div class="error-state">❌ Unable to load profile<br><small>${escapeHtml(e.message)}</small></div><div class="footer">Check URL or regenerate</div>`;
      }
    }
    document.addEventListener('DOMContentLoaded', loadProfile);
  </script>
</body>
</html>
