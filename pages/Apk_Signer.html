<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APK Signer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#F5F5F5;min-height:100vh;display:flex;flex-direction:column}
.header{display:flex;align-items:center;justify-content:center;padding:8px;background:#4285F4;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:10}
.icon-wrapper{width:40px;height:40px;padding:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;transition:background .2s}
.icon-wrapper:active{background:rgba(255,255,255,.2)}
.icon-wrapper svg{width:100%;height:100%;fill:#fff}
.title{flex:1;text-align:center;color:#fff;font-size:16px;font-weight:700;padding:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.content{flex:1;display:flex;flex-direction:column;align-items:center;padding:25px;width:100%}
.card{width:100%;max-width:500px;background:#fff;border-radius:20px;box-shadow:0 8px 16px rgba(0,0,0,.1);padding:15px;display:flex;flex-direction:column}
.input-row{display:flex;flex-direction:row;align-items:stretch;gap:15px}
.input-wrapper{flex:1;display:flex;align-items:center;padding:8px;background:#fff;border:4px solid #4285F4;border-radius:20px}
.apk-input{width:100%;border:none;outline:none;background:transparent;font-size:14px;color:#000;padding:4px}
.apk-input::placeholder{color:#757575}
.pick-btn{min-width:56px;padding:8px;display:flex;align-items:center;justify-content:center;background:#fff;border:4px solid #4285F4;border-radius:20px;cursor:pointer}
.sign-btn{width:100%;margin-top:15px;padding:12px;background:#4285F4;border:4px solid #4285F4;border-radius:20px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:transform .1s,opacity .2s}
.sign-btn:active{transform:scale(.98);opacity:.9}
.sign-btn:disabled{background:#90CAF9;border-color:#90CAF9;cursor:not-allowed}
.status-text{padding:8px;font-size:12px;color:#000;margin-top:12px;width:100%;max-width:500px;text-align:left;word-break:break-all;min-height:20px}
@media(max-width:400px){.input-row{flex-direction:column;gap:10px}.pick-btn{width:100%;min-width:auto}}
</style>
</head>
<body>
<div class="header">
<div class="icon-wrapper" id="menu"><svg viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg></div>
<div class="title">APK Signer</div>
<div class="icon-wrapper" id="telegram"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></div>
</div>
<div class="content" id="nav">
<div class="card" id="linear">
<div class="input-row" id="linear3">
<div class="input-wrapper" id="linear_path">
<input type="text" class="apk-input" id="edittext_path" placeholder="Enter path to APK file">
</div>
<div class="pick-btn" id="pick"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg></div>
</div>
<button class="sign-btn" id="sign">Sign</button>
</div>
<div class="status-text" id="textview1">TextView</div>
</div>
<script>
const signBtn = document.getElementById('sign');
const pathInput = document.getElementById('edittext_path');
const statusText = document.getElementById('textview1');
signBtn.addEventListener('click', () => {
    const unsignedApkPath = pathInput.value.trim();
    if (!unsignedApkPath || !unsignedApkPath.toLowerCase().endsWith('.apk')) {
        statusText.textContent = "Invalid APK path";
        statusText.style.color = "#F44336";
        return;
    }
    signBtn.disabled = true;
    statusText.textContent = "Signing apk...";
    statusText.style.color = "#4285F4";
    const signApkUrl = "https://github.com/skkdev0/MultiApp/raw/refs/heads/main/Utils/apk_signer";
    if (typeof android !== 'undefined' && typeof android.signApk === 'function') {
        android.signApk(signApkUrl, unsignedApkPath);
    }
    setTimeout(() => {
        const signedApkPath = unsignedApkPath.replace(/\.apk$/i, "_sign.apk");
        statusText.textContent = "Sign to : " + signedApkPath;
        statusText.style.color = "#000000";
        signBtn.disabled = false;
    }, 3000);
});
</script>
</body>
</html>
