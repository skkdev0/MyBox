<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6366f1">
  <title>Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #0ea5e9;
      --bg-light: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
      --bg-dark: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card-light: #ffffff; --card-dark: #1e293b;
      --text-primary-light: #1e293b; --text-primary-dark: #f1f5f9;
      --text-secondary-light: #64748b; --text-secondary-dark: #94a3b8;
      --border-light: #e2e8f0; --border-dark: #334155;
      --success: #22c55e; --error: #ef4444;
      --shadow-light: 0 20px 50px -12px rgba(0,0,0,0.15);
      --shadow-dark: 0 20px 50px -12px rgba(0,0,0,0.4);
      --radius: 28px; --radius-sm: 16px;
    }
    [data-theme="dark"] {
      --bg-gradient: var(--bg-dark); --card-bg: var(--card-dark);
      --text-primary: var(--text-primary-dark); --text-secondary: var(--text-secondary-dark);
      --border: var(--border-dark); --shadow: var(--shadow-dark);
    }
    [data-theme="light"] {
      --bg-gradient: var(--bg-light); --card-bg: var(--card-light);
      --text-primary: var(--text-primary-light); --text-secondary: var(--text-secondary-light);
      --border: var(--border-light); --shadow: var(--shadow-light);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      background: var(--bg-gradient); min-height: 100vh; display: flex;
      justify-content: center; align-items: center; padding: 20px;
      color: var(--text-primary); transition: background 0.3s, color 0.3s;
    }
    .profile-card {
      width: 100%; max-width: 540px; background: var(--card-bg);
      border-radius: var(--radius); padding: 44px 36px;
      box-shadow: var(--shadow); text-align: center;
      animation: cardLoad 0.5s ease; border: 1px solid var(--border);
      position: relative;
    }
    @keyframes cardLoad { from { opacity: 0; transform: translateY(32px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .theme-toggle {
      position: absolute; top: 20px; right: 20px;
      background: var(--border); border: none; width: 40px; height: 40px;
      border-radius: 12px; cursor: pointer; display: flex; align-items: center;      justify-content: center; font-size: 18px; transition: all 0.2s;
      color: var(--text-primary);
    }
    .theme-toggle:hover { background: var(--primary); color: white; transform: rotate(15deg); }
    .profile-header { margin-bottom: 28px; }
    .profile-avatar {
      width: 112px; height: 112px; border-radius: 50%; margin: 0 auto 22px;
      border: 4px solid var(--primary); object-fit: cover;
      background: var(--border); display: flex; align-items: center;
      justify-content: center; font-size: 42px; color: var(--text-secondary);
      transition: transform 0.3s; cursor: pointer;
    }
    .profile-avatar:hover { transform: scale(1.06) rotate(2deg); }
    .profile-avatar img { width: 100%; height: 100%; border-radius: 50%; }
    .profile-name { font-size: 26px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .profile-role { font-size: 15px; color: var(--text-secondary); font-weight: 500; }
    .about-section {
      background: rgba(99,102,241,0.08); border-radius: var(--radius-sm);
      padding: 22px; margin: 26px 0; text-align: left; white-space: pre-wrap;
      font-size: 14px; color: var(--text-primary); line-height: 1.7;
      border-left: 4px solid var(--primary);
    }
    .links-section { display: grid; gap: 14px; margin-top: 30px; }
    .link-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 16px 22px; border-radius: var(--radius-sm); text-decoration: none;
      font-weight: 600; font-size: 15px; transition: all 0.25s; color: white;
      position: relative; overflow: hidden;
    }
    .link-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.25), transparent); opacity: 0; transition: opacity 0.25s; }
    .link-btn:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.2); }
    .link-btn:hover::before { opacity: 1; }
    .link-btn:active { transform: translateY(-2px); }
    .yt-btn { background: linear-gradient(135deg, #ff0000, #cc0000); }
    .tg-btn { background: linear-gradient(135deg, #0088cc, #006699); }
    .status-bar { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 32px; font-size: 13px; color: var(--text-secondary); }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
    .view-count { background: var(--border); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .error-state { background: rgba(239,68,68,0.1); border: 2px solid rgba(239,68,68,0.3); border-radius: var(--radius-sm); padding: 28px; text-align: center; color: var(--error); font-size: 14px; line-height: 1.6; }
    .error-state code { background: rgba(239,68,68,0.15); padding: 3px 8px; border-radius: 6px; font-family: monospace; font-size: 12px; }
    .footer { margin-top: 36px; font-size: 12px; color: var(--text-secondary); }
    .loading { color: var(--text-secondary); font-style: italic; padding: 50px 20px; }
    .hidden { display: none !important; }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 640px) {
      .profile-card { padding: 36px 24px; }
      .profile-avatar { width: 96px; height: 96px; }
      .profile-name { font-size: 22px; }      .link-btn { padding: 14px 18px; font-size: 14px; }
    }
    @media print {
      body { background: white; }
      .profile-card { box-shadow: none; border: none; }
      .theme-toggle, .link-btn { display: none; }
      .about-section { border-left-color: #666; }
    }
  </style>
</head>
<body>
  <div class="profile-card" id="profileCard">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
    <p class="loading">Loading profile...</p>
  </div>
  <script>
    const $ = id => document.getElementById(id);
    const base64ToUtf8 = str => decodeURIComponent(escape(atob(str)));
    const escapeHtml = text => {
      if (!text) return '';
      const map = { '&': '&', '<': '<', '>': '>', '"': '"', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    };
    const isValidUrl = str => { try { new URL(str); return true; } catch { return false; } };
    const initTheme = () => {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
    };
    const toggleTheme = () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    };
    const incrementView = () => {
      const key = 'profileViews_' + window.location.href;
      const count = parseInt(localStorage.getItem(key) || '0') + 1;
      localStorage.setItem(key, count);
      return count;
    };
    const loadProfile = () => {
      const params = new URLSearchParams(window.location.search);
      const encoded = params.get('a');
      const card = $('profileCard');
      if (!encoded) {
        card.innerHTML = `<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button><div class="error-state">❌ Profile data not found<br><small>URL must include <code>?a=...</code></small></div><div class="footer">Profile System</div>`;
        $('themeToggle').addEventListener('click', toggleTheme);
        return;
      }      try {
        const decoded = base64ToUtf8(encoded);
        const data = JSON.parse(decoded);
        const viewCount = incrementView();
        let html = `<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button><div class="profile-header fade-in">`;
        if (data.img && isValidUrl(data.img)) {
          html += `<img src="${escapeHtml(data.img)}" alt="Profile" class="profile-avatar" onerror="this.outerHTML='<div class=\\'profile-avatar\\'>👤</div>'">`;
        } else {
          html += `<div class="profile-avatar">👤</div>`;
        }
        if (data.name) html += `<div class="profile-name">${escapeHtml(data.name)}</div>`;
        if (data.role) html += `<div class="profile-role">${escapeHtml(data.role)}</div>`;
        html += '</div>';
        if (data.about && data.about.trim()) {
          html += `<div class="about-section fade-in" style="animation-delay:0.1s">${escapeHtml(data.about)}</div>`;
        }
        const links = [];
        if (data.yt && isValidUrl(data.yt)) links.push({ url: data.yt, text: '📺 YouTube', cls: 'yt-btn' });
        if (data.tg && isValidUrl(data.tg)) links.push({ url: data.tg, text: '✈️ Telegram', cls: 'tg-btn' });
        if (links.length > 0) {
          html += `<div class="links-section">`;
          links.forEach((l, i) => { html += `<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener" class="link-btn ${l.cls} fade-in" style="animation-delay:${0.15+i*0.05}s">${l.text}</a>`; });
          html += `</div>`;
        }
        html += `<div class="status-bar fade-in" style="animation-delay:0.3s"><span class="status-dot"></span><span>Active</span><span class="view-count">👁️ ${viewCount}</span></div>`;
        html += `<div class="footer">Shared securely</div>`;
        card.innerHTML = html;
        $('themeToggle').addEventListener('click', toggleTheme);
        document.querySelectorAll('.profile-avatar').forEach(av => {
          av.addEventListener('click', () => { if (av.tagName === 'IMG' && av.src) window.open(av.src, '_blank'); });
        });
      } catch (e) {
        card.innerHTML = `<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button><div class="error-state">❌ Unable to load profile<br><small>${escapeHtml(e.message)}</small></div><div class="footer">Check URL or regenerate</div>`;
        $('themeToggle').addEventListener('click', toggleTheme);
      }
    };
    document.addEventListener('DOMContentLoaded', () => { initTheme(); loadProfile(); });
  </script>
</body>
</html>
