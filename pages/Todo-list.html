<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline Todo Pro</title>
    <!-- Fonts ko hata diya, ab system fonts use honge jo already phone me hote hain -->
    <style>
        /* --- THEME VARIABLES --- */
        :root {
            --primary: #6750A4;
            --primary-container: #EADDFF;
            --background: #FDF7FF;
            --surface: #FFFFFF;
            --surface-variant: #E7E0EC;
            --text-main: #1C1B1F;
            --text-sec: #49454F;
            --error: #B3261E;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --primary: #D0BCFF;
            --primary-container: #4F378B;
            --background: #141218;
            --surface: #1D1B20;
            --surface-variant: #49454F;
            --text-main: #E6E1E5;
            --text-sec: #CAC4D0;
            --shadow: rgba(0,0,0,0.5);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; /* System Fonts */
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
            -webkit-user-select: none; user-select: none;
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- SVG ICON STYLES (NEW) --- */
        .icon {
            width: 24px;
            height: 24px;
            fill: currentColor; /* Text color inherit karega */
            display: inline-block;
            vertical-align: middle;
        }

        .icon-lg { width: 28px; height: 28px; }
        .icon-xl { width: 64px; height: 64px; opacity: 0.5; }

        /* --- HEADER & SEARCH --- */
        header {
            background-color: var(--surface);
            padding: 16px 20px;
            height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 4px var(--shadow);
            z-index: 10;
            position: relative;
        }

        .header-content {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; transition: opacity 0.2s;
        }
        .header-content.hidden { opacity: 0; pointer-events: none; position: absolute; }

        header h1 { font-size: 22px; font-weight: 500; }

        .search-bar {
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            background: var(--surface);
            padding: 0 10px;
            display: flex; align-items: center; gap: 10px;
            transform: translateY(-100%); transition: transform 0.3s ease;
            z-index: 20;
        }
        .search-bar.active { transform: translateY(0); }

        .search-input {
            flex: 1;
            background: transparent; border: none;
            font-size: 18px; color: var(--text-main);
            user-select: text; 
        }
        
        .menu-btn { cursor: pointer; padding: 8px; border-radius: 50%; color: var(--text-main); display: flex; align-items: center; justify-content: center; }
        .menu-btn:active { background: var(--surface-variant); }

        /* --- DRAWER --- */
        .drawer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 190;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .drawer-overlay.open { opacity: 1; pointer-events: auto; }

        .drawer {
            position: fixed; top: 0; left: 0; width: 280px; height: 100%;
            background: var(--surface); z-index: 200;
            transform: translateX(-100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 2px 0 10px var(--shadow);
        }
        .drawer.open { transform: translateX(0); }

        .drawer-header { padding: 40px 20px 20px; background: var(--surface-variant); margin-bottom: 10px; }
        .drawer-header h2 { font-size: 24px; color: var(--text-main); }
        .drawer-header p { font-size: 14px; color: var(--text-sec); }

        .drawer-item { padding: 16px 24px; display: flex; align-items: center; gap: 20px; cursor: pointer; font-size: 16px; font-weight: 500; color: var(--text-main); }
        .drawer-item:active { background: var(--surface-variant); }
        .drawer-item .icon { fill: var(--text-sec); }

        /* --- LIST --- */
        .content-area { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px; }

        .task-card {
            background: var(--surface); padding: 16px; border-radius: 12px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 1px 3px var(--shadow); animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .task-card:active { transform: scale(0.98); background: var(--surface-variant); }
        
        /* SVG Checkbox logic */
        .checkbox { 
            width: 24px; height: 24px; 
            border: 2px solid var(--primary); border-radius: 4px; 
            display: flex; align-items: center; justify-content: center;
        }
        .task-card.completed .checkbox { background-color: var(--primary); }
        .checkbox svg { fill: var(--surface); display: none; width: 18px; height: 18px; }
        .task-card.completed .checkbox svg { display: block; }

        .task-text { flex: 1; font-size: 16px; color: var(--text-main); }
        .task-card.completed .task-text { text-decoration: line-through; color: var(--text-sec); }
        
        .delete-icon { padding: 8px; border-radius: 50%; color: var(--text-sec); cursor: pointer; }
        .delete-icon:active { color: var(--error); background: rgba(179, 38, 30, 0.1); }
        .delete-icon svg { fill: currentColor; }

        /* --- FAB --- */
        .fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; background: var(--primary); color: var(--surface); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px var(--shadow); z-index: 20; }

        /* --- OVERLAYS --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 90; opacity: 0; pointer-events: none; transition: 0.2s; }
        .overlay.active { opacity: 1; pointer-events: auto; }

        .bottom-sheet { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface); padding: 24px; border-radius: 28px 28px 0 0; transform: translateY(100%); transition: 0.3s ease; z-index: 100; }
        .bottom-sheet.active { transform: translateY(0); }
        
        .input-box { width: 100%; padding: 16px; border: 1px solid var(--text-sec); border-radius: 8px; font-size: 16px; margin-bottom: 20px; background: var(--background); color: var(--text-main); user-select: text; }
        .input-box:focus { border-color: var(--primary); }
        .btn-save { background: var(--primary); color: var(--surface); padding: 10px 24px; border-radius: 20px; font-weight: 500; border: none; float: right; cursor: pointer; }

        /* --- DIALOG --- */
        .dialog-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: var(--surface); width: 85%; max-width: 320px; padding: 24px; border-radius: 28px; z-index: 300; opacity: 0; pointer-events: none; transition: 0.2s; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .dialog-box.open { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        .d-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .d-btn { padding: 10px 20px; border-radius: 20px; border: none; font-weight: 500; background: transparent; cursor: pointer; }
        .d-cancel { color: var(--primary); }
        .d-confirm { background: var(--error); color: white; }

        /* --- MESSAGES --- */
        .center-msg { display: none; flex-direction: column; align-items: center; justify-content: center; height: 60%; color: var(--text-sec); text-align: center; }
        .center-msg svg { margin-bottom: 10px; fill: var(--text-sec); }

    </style>
</head>
<body>

    <!-- ICONS DEFINITIONS (Inline SVG Paths) -->
    <script>
        const icons = {
            menu: '<svg class="icon" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>',
            search: '<svg class="icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>',
            back: '<svg class="icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>',
            close: '<svg class="icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>',
            add: '<svg class="icon-lg" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>',
            check: '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>',
            delete: '<svg class="icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>',
            dark: '<svg class="icon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>',
            sweep: '<svg class="icon" viewBox="0 0 24 24"><path d="M15 16h4v2h-4zm0-8h7v2h-7zm0 4h6v2h-6zM3 18c0 1.1.9 2 2 2h6c1.1 0 2-.9 2-2V8H3v10zM14 5h-3l-1-1H6L5 5H2v2h12z"/></svg>',
            empty: '<svg class="icon-xl" viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>',
            noresult: '<svg class="icon-xl" viewBox="0 0 24 24"><path d="M19.3 16.9C20.36 15.48 21 13.74 21 11.86c0-4.66-3.45-8.61-8-9.04V1h-2v1.82c-4.55.43-8 4.38-8 9.04 0 1.87.64 3.62 1.7 5.03l-3.42 3.42 1.41 1.41 18.02-18.01-1.41-1.41zM11 20c-4.41 0-8-3.59-8-8 0-1.39.37-2.69 1-3.83l10.83 10.83C13.69 19.63 12.39 20 11 20zm7-8c0-1.28-.35-2.48-.96-3.52l1.52-1.52c.9.46 1.72 1.1 2.37 1.88-.58-.72-1.27-1.35-2.06-1.85-.75-.48-1.58-.83-2.47-1.03C17.7 7.55 18 9.24 18 11z"/></svg>' // Simplified broken search
        };
    </script>

    <!-- DRAWER -->
    <div class="drawer-overlay" id="drawer-overlay" onclick="toggleDrawer()"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <h2>Settings</h2>
            <p>App Preferences</p>
        </div>
        <div class="drawer-item" onclick="toggleTheme()">
            <script>document.write(icons.dark)</script>
            <span>Dark Mode</span>
        </div>
        <div class="drawer-item" onclick="confirmClearAll()">
            <div style="color:var(--error); display:flex; align-items:center;">
                <script>document.write(icons.sweep.replace('class="icon"', 'class="icon" style="fill:var(--error)"'))</script>
            </div>
            <span style="color:var(--error)">Clear All</span>
        </div>
        <div class="drawer-item" onclick="toggleDrawer()">
            <script>document.write(icons.close)</script>
            <span>Close Menu</span>
        </div>
    </div>

    <!-- HEADER -->
    <header>
        <div class="header-content" id="header-normal">
            <span class="menu-btn" onclick="toggleDrawer()">
                <script>document.write(icons.menu)</script>
            </span>
            <h1>Todo List</h1>
            <span class="menu-btn" onclick="openSearch()">
                <script>document.write(icons.search)</script>
            </span>
        </div>

        <div class="search-bar" id="search-bar">
            <span class="menu-btn" onclick="closeSearch()">
                <script>document.write(icons.back)</script>
            </span>
            <input type="text" class="search-input" id="search-input" placeholder="Search tasks...">
            <span class="menu-btn" onclick="clearSearch()" style="opacity: 0.7;">
                <script>document.write(icons.close)</script>
            </span>
        </div>
    </header>

    <!-- CONTENT -->
    <div class="content-area" id="list-container"></div>
    
    <div class="center-msg" id="empty-state">
        <script>document.write(icons.empty)</script>
        <p>No tasks yet<br>Click + to add</p>
    </div>
    
    <div class="center-msg" id="no-result-state">
        <script>document.write(icons.search)</script>
        <p>No results found</p>
    </div>

    <div class="fab" onclick="openSheet()">
        <script>document.write(icons.add)</script>
    </div>

    <!-- INPUT SHEET -->
    <div class="overlay" id="sheet-overlay" onclick="closeSheet()"></div>
    <div class="bottom-sheet" id="bottom-sheet">
        <h3 style="margin-bottom:15px; color:var(--text-main)">New Task</h3>
        <input type="text" class="input-box" id="task-input" placeholder="What to do?">
        <button class="btn-save" onclick="addTask()">Save Task</button>
    </div>

    <!-- DIALOG -->
    <div class="overlay" id="dialog-overlay" style="z-index:250"></div>
    <div class="dialog-box" id="delete-dialog">
        <h3 style="color:var(--text-main)">Confirm</h3>
        <p style="color:var(--text-sec)" id="dialog-msg">Delete this item?</p>
        <div class="d-actions">
            <button class="d-btn d-cancel" onclick="closeDialog()">Cancel</button>
            <button class="d-btn d-confirm" onclick="executeDelete()">Delete</button>
        </div>
    </div>

    <script>
        // --- ELEMENTS ---
        const listContainer = document.getElementById("list-container");
        const emptyState = document.getElementById("empty-state");
        const noResultState = document.getElementById("no-result-state");
        const searchInput = document.getElementById("search-input");
        const headerNormal = document.getElementById("header-normal");
        const searchBar = document.getElementById("search-bar");

        let isSearchActive = false;
        let deleteType = null; 
        let deleteId = null;

        document.addEventListener("DOMContentLoaded", () => {
            renderTasks();
            if(localStorage.getItem("theme") === "dark") document.body.classList.add("dark-mode");
        });

        // --- SEARCH ---
        function openSearch() {
            isSearchActive = true;
            headerNormal.classList.add("hidden");
            searchBar.classList.add("active");
            setTimeout(() => searchInput.focus(), 100);
        }

        function closeSearch() {
            isSearchActive = false;
            headerNormal.classList.remove("hidden");
            searchBar.classList.remove("active");
            searchInput.value = "";
            renderTasks();
        }

        function clearSearch() {
            searchInput.value = "";
            searchInput.focus();
            renderTasks();
        }

        searchInput.addEventListener("input", (e) => {
            renderTasks(e.target.value);
        });

        // --- TASKS LOGIC ---
        function getTasks() { return JSON.parse(localStorage.getItem("flutterTasks")) || []; }
        function saveTasks(t) { localStorage.setItem("flutterTasks", JSON.stringify(t)); }

        function renderTasks(filterText = "") {
            let tasks = getTasks();
            listContainer.innerHTML = "";
            
            if(filterText) {
                tasks = tasks.filter(t => t.text.toLowerCase().includes(filterText.toLowerCase()));
            }

            emptyState.style.display = "none";
            noResultState.style.display = "none";

            if (tasks.length === 0) {
                if(filterText) noResultState.style.display = "flex";
                else if(getTasks().length === 0) emptyState.style.display = "flex"; 
            } else {
                tasks.sort((a,b) => a.completed - b.completed);
                tasks.forEach(t => {
                    let completed = t.completed ? "completed" : "";
                    
                    // Insert SVGs dynamically here
                    let html = `
                    <div class="task-card ${completed}" onclick="toggleTask(${t.id})">
                        <div class="checkbox">
                            ${icons.check}
                        </div>
                        <span class="task-text">${t.text}</span>
                        <div class="delete-icon" onclick="confirmDelete(${t.id}, event)">
                            ${icons.delete}
                        </div>
                    </div>`;
                    listContainer.innerHTML += html;
                });
            }
        }

        function addTask() {
            const val = document.getElementById("task-input").value.trim();
            if(!val) return;
            let tasks = getTasks();
            tasks.push({ id: Date.now(), text: val, completed: false });
            saveTasks(tasks);
            closeSheet();
            if(isSearchActive) closeSearch();
            else renderTasks();
        }

        function toggleTask(id) {
            let tasks = getTasks();
            tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
            saveTasks(tasks);
            renderTasks(isSearchActive ? searchInput.value : "");
        }

        // --- DRAWER & THEME ---
        function toggleDrawer() {
            document.getElementById("drawer").classList.toggle("open");
            document.getElementById("drawer-overlay").classList.toggle("open");
        }
        
        function toggleTheme() {
            document.body.classList.toggle("dark-mode");
            localStorage.setItem("theme", document.body.classList.contains("dark-mode") ? "dark" : "light");
            toggleDrawer();
        }

        // --- DELETE ---
        function confirmDelete(id, e) {
            e.stopPropagation();
            deleteType = 'single'; deleteId = id;
            document.getElementById("dialog-msg").innerText = "Delete this task?";
            openDialog();
        }

        function confirmClearAll() {
            toggleDrawer();
            if(getTasks().length === 0) return;
            deleteType = 'all';
            document.getElementById("dialog-msg").innerText = "Delete ALL tasks?";
            openDialog();
        }

        function openDialog() {
            document.getElementById("delete-dialog").classList.add("open");
            document.getElementById("dialog-overlay").classList.add("active");
        }

        function closeDialog() {
            document.getElementById("delete-dialog").classList.remove("open");
            document.getElementById("dialog-overlay").classList.remove("active");
        }

        function executeDelete() {
            let tasks = getTasks();
            if(deleteType === 'single') tasks = tasks.filter(t => t.id !== deleteId);
            else tasks = [];
            saveTasks(tasks);
            renderTasks(isSearchActive ? searchInput.value : "");
            closeDialog();
        }

        // --- UI ---
        function openSheet() {
            document.getElementById("bottom-sheet").classList.add("active");
            document.getElementById("sheet-overlay").classList.add("active");
            setTimeout(()=> document.getElementById("task-input").focus(), 100);
        }
        function closeSheet() {
            document.getElementById("bottom-sheet").classList.remove("active");
            document.getElementById("sheet-overlay").classList.remove("active");
            document.getElementById("task-input").value = "";
        }
        document.getElementById("task-input").addEventListener("keypress", (e)=> { if(e.key==="Enter") addTask(); });

    </script>
</body>
</html>
